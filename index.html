<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Sigma</title>
    <style>
            header {
              display: flex;
              justify-content: space-between;
              align-items: center;
              padding: 10px 20px;
              background-color: #8f8383;
              transition: background-color 0.6s ease;
            }

            header:hover {
              background-color: #c7e9ff;
            }
            nav a {

              margin: 0 5px;
              text-decoration: none;
              color: white;
              padding: 5px 10px;
              border-radius: 5px;
              transition: background-color 0.5s ease, transform 0.3s ease;
            }
            #logo h2 {
              transition: letter-spacing 0.4s ease, color 0.4s ease;
            }

            #logo h2:hover {
              letter-spacing: 3px;
              color: rgb(199, 182, 245);
            }

            nav a:hover {
              background-color: darkblue;
              transform: scale(1.1);
            }
            
            #social img {
              width: 30px;
              height: auto;
              transition: transform 0.4s ease, opacity 0.4s ease;
            }

            #social img:hover {
              transform: scale(1.2) rotate(10deg);
              opacity: 0.7;
            }
            footer {
              display: flex;
              justify-content: space-between;
              align-items: center;
              padding: 10px 20px;
              background-color: blanchedalmond;
              transition: transform 0.4s ease, box-shadow 0.4s ease;
            }

            footer:hover {
              transform: translateY(-5px);
              box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            }
            a {
              background-color: rgb(209, 209, 224);
              transition: background-color 2s;
            }
    </style>
  </head>
  <body>
    <header>
      <section id="logo">
        <h2>Radosław</h2>
      </section>
      <section id="social">
        <a herf="#">
          <img src="facebook.png" alt="Facebook" />
        </a>
      </section>
    </header>
    <footer>
      <nav>
        <a herf="#">Home</a>
        <a href="#">O mnie</a>
        <a href="#">Kontakt</a>
      </nav>
    </footer>
  </body>
</html>
